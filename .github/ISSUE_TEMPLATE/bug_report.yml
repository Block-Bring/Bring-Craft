name: "🐛 Bug 报告"
description: 提交一个 Bug 帮助我们改进
title: "[Bug]: "
labels: ["bug"]  # 自动打上 bug 标签

body:
  - type: markdown
    attributes:
      value: |
        感谢您报告问题！请填写以下信息。

  - type: checkboxes
    id: type
    attributes:
      label: 二次定性
      description: 重新确定当前 issue 类型
      options:
        - label: 我确认我想要提交的的确是一个非预期性的 Bug，而不是新内容建议。
          required: true
        - label: 我是在移动端遇到这个问题的

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 请清晰简洁地描述这个 bug
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 如何复现这个问题？
      placeholder: |
        1. 打开 '...'
        2. 点击 '....'
        3. 看到错误情况
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      description: 你使用的是什么系统？
      options:
        - Windows
        - macOS
        - Android
    validations:
      required: true
